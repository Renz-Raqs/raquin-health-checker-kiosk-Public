<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raquin BMI Calculator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <h1>Health Self-Check Kiosk</h1>
    </header>

    <main>

        <section class="form-container">

            <form id="bmiForm">

                <label for="name">Full Name</label>
                <input type="text" id="name" required>

                <label for="age">Age</label>
                <input type="number" id="age" min="1" max="120" required>

                <label for="sex">Sex</label>
                <select id="sex" required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>

                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" min="1" step="0.1" required>

                <label for="height">Height (cm)</label>
                <input type="number" id="height" min="1" step="0.1" required>

                <div class="button-group">
                    <button type="submit" class="calculate-btn">Calculate BMI</button>
                    <button type="reset" class="reset-btn">Reset</button>
                </div>

            </form>

        </section>

        <section id="resultCard" class="hidden"></section>

    </main>

    <footer>
        <p>© Renz Raquin | All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>

</html>
